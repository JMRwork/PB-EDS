<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CRUD de Tarefas</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<style>
		body {
			background-color: #f8f9fa;
		}

		.table-actions .btn {
			margin-right: 0.25rem;
		}
	</style>
</head>

<body>
	<div class="container py-4">
		<header class="pb-3 mb-4 border-bottom">
			<h1 class="display-5 fw-bold"><i class="bi bi-check2-square"></i> Gerenciador de Tarefas</h1>
		</header>

		<div class="container px-0 py-4">
			<form id="novaTarefaForm" action="tarefa/adicionar" method="post">
				<div class="mb-3">
					<p class="display-6">Nova Tarefa</p>
				</div>
				<div class="mb-3">
					<select class="form-select" name="categoria" required>
						<option value="" selected disabled>Selecione a categoria...</option>
						<option value="trabalho">Trabalho</option>
						<option value="domestica">Domestica</option>
						<option value="pessoal">Pessoal</option>
						<option value="programacao">Programação</option>
					</select>
				</div>
				<div class="mb-3">
					<textarea class="form-control" placeholder="Nova tarefa..." name="descricao"></textarea>
				</div>
				<div id="validacaoForm" class="alert alert-info d-none"></div>
				<button type="submit" class="btn btn-primary" id="btnNovaTarefa">
					<i class="bi bi-plus-circle"></i> Nova Tarefa
				</button>
				<p id="resultadoNovaTarefaForm" class="alert d-none"></p>
			</form>
		</div>
		<!-- Tabela de tarefas -->
		<div class="table-responsive">
			<table class="table table-striped table-hover align-middle">
				<thead class="table-dark">
					<tr>
						<th scope="col">ID</th>
						<th scope="col">Descrição</th>
						<th scope="col">Categoria</th>
						<th scope="col">Status</th>
						<th scope="col" style="width: 150px;">Ações</th>
					</tr>
				</thead>
				<tbody id="task-list">
					<!-- Preenchido via JavaScript -->
				</tbody>
			</table>
		</div>

		<!-- Modal para adicionar/editar tarefa -->
		<div class="modal fade" id="taskModal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="taskModalLabel">Editar Tarefa</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
					</div>
					<div class="modal-body">
						<form id="task-form">
							<input type="hidden" id="task-id" value="">

							<div class="mb-3">
								<label for="descricao" class="form-label">Descrição</label>
								<input type="text" class="form-control" id="descricao" placeholder="Digite a descrição"
									required>
							</div>

							<div class="mb-3">
								<label for="categoria" class="form-label">Categoria</label>
								<select class="form-select" id="categoria" required>
									<option value="" selected disabled>Selecione...</option>
									<option value="TRABALHO">Trabalho</option>
									<option value="DOMESTICA">Domestica</option>
									<option value="PESSOAL">Pessoal</option>
									<option value="PROGRAMACAO">Programação</option>
								</select>
							</div>

							<div class="mb-3">
								<label for="status" class="form-label">Status</label>
								<select class="form-select" id="status" required>
									<option value="" selected disabled>Selecione...</option>
									<option value="Pendente">Pendente</option>
									<option value="Concluída">Concluída</option>
								</select>
							</div>
							<div id="validacaoModal" class="alert alert-info d-none"></div>
						</form>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
						<button type="button" class="btn btn-primary" id="salvarTarefa">Salvar</button>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Bootstrap JS e Popper -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

	<script>
		// Elementos DOM
		const newTaskForm = document.getElementById("novaTarefaForm")
		const validacaoForm = document.getElementById("validacaoForm")
		const validacaoModal = document.getElementById("validacaoModal")
		const resultMessageTaskForm = document.getElementById("resultadoNovaTarefaForm")
		const taskListEl = document.getElementById('task-list');
		const taskModal = new bootstrap.Modal(document.getElementById('taskModal'));
		const taskForm = document.getElementById('task-form');
		const taskId = document.getElementById('task-id');
		const descricaoInput = document.getElementById('descricao');
		const categoriaSelect = document.getElementById('categoria');
		const statusSelect = document.getElementById('status');
		const modalTitle = document.getElementById('taskModalLabel');
		const btnNovaTarefa = document.getElementById('btnNovaTarefa');
		const btnSalvar = document.getElementById('salvarTarefa');


		async function loadTasks() {
			const tasks = await fetch("tarefas")
				.then(response => {
					return response.json();
				});
			renderTasks(tasks);
		}


		// Renderizar tabela
		function renderTasks(tasks) {
			taskListEl.innerHTML = '';
			tasks.forEach(task => {
				const tr = document.createElement('tr');
				tr.innerHTML = `
                    <td>${task.Id}</td>
                    <td>${task.descricao}</td>
                    <td>${task.categoria.charAt(0).toUpperCase() + task.categoria.slice(1).toLowerCase()}</td>
                    <td>
                        <span class='badge ${getStatusBadgeClass(task.concluido ? "Concluída" : "Pendente")}'>${task.concluido ? "Concluída" : "Pendente"}</span>
                    </td>
                    <td class="table-actions">
                        <button class="btn btn-sm btn-warning" onclick="editTask(${task.Id})" title="Editar">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteTask(${task.Id})" title="Excluir">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                `;
				taskListEl.appendChild(tr);
			});
		}

		// Retorna a classe do badge conforme status
		function getStatusBadgeClass(status) {
			switch (status) {
				case 'Pendente': return 'bg-warning text-dark';
				case 'Concluída': return 'bg-success';
				default: return 'bg-secondary';
			}
		}

		// Abrir modal para edição
		async function editTask(id) {
			const task = await fetch(`tarefa/${id}`)
				.then(response => {
					if (response.status == 200) {
						return response.json()
					}
				})

			taskId.value = task.Id;
			descricaoInput.value = task.descricao;
			categoriaSelect.value = task.categoria;
			statusSelect.value = task.status ? "Concluída" : "Pendente";
			taskModal.show();
		};

		// Excluir tarefa
		async function deleteTask(id) {
			if (confirm('Tem certeza que deseja excluir esta tarefa?')) {
				await fetch("tarefas/excluir", {
					method: "DELETE", body: JSON.stringify(id), headers: new Headers({
						"Content-Type": "application/json",
					})
				})
				if (taskId.value == id) {
					taskModal.hide();
				}
			}
			loadTasks()
		};

		// Salvar (adicionar ou atualizar)
		async function updateTask() {
			const Id = taskId.value ? parseInt(taskId.value) : null;
			const descricao = descricaoInput.value.trim();
			const categoria = categoriaSelect.value;
			const concluido = statusSelect.value;
			if (!descricao || !categoria || !concluido) {
				alert('Preencha todos os campos!');
				return;
			}

			await fetch(`tarefas/editar`, {
				method: "PUT", body: JSON.stringify(
					{
						Id,
						descricao,
						categoria,
						concluido: concluido == "Concluída" ? true : false
					}),
				headers: new Headers({
					"Content-Type": "application/json",
				})
			})
				.then(response => {
					if (response.status != 200) return response.json();
					if (!validacaoModal.classList.contains("d-none")) validacaoModal.classList.add("d-none")
					taskModal.hide();
					return false
				})
				.then(response => {
					if (response) {
						let responseString = ``;
						validacaoModal.classList.remove("d-none");
						for (const [key, value] of Object.entries(response)) {
						  responseString += `${value}\n`;
						}
						validacaoModal.textContent = responseString;
					} 
				})
			loadTasks();
			
		}

		// Event listeners
		btnSalvar.addEventListener('click', updateTask);
		newTaskForm.addEventListener('submit',
			async (e) => {
				e.preventDefault();
				const result = await fetch('tarefas/adicionar', {
					method: 'POST',
					body: new FormData(newTaskForm)
				}).then(response => {
					if (response.status !== 201) return response.json()
					if (!validacaoForm.classList.contains("d-none")) validacaoForm.classList.add("d-none")
					return false
				}).then(response => {
					if (response) {
						let responseString ="";
						validacaoForm.classList.remove("d-none");
						for (const [key, value] of Object.entries(response)) {
												  responseString += `${value}\n`;
												}
						validacaoForm.textContent = responseString;
					}
				});
				loadTasks();
			}
		);
		// Inicializar
		loadTasks();
	</script>
</body>

</html>
