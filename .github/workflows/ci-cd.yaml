name: PB-EDS - CI / CD
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente para deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
 
jobs:
  Test-and-Build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Get Repository
        uses: actions/checkout@v6

      - name: Setting Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended,security-and-quality

      - name: Maven Test and Build verify phase
        run: mvn clean -B -U verify

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

      - name: Generate Artifacts  
        run: mkdir staging && cp target/*.jar staging/app.jar

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: App
          path: staging/app.jar

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: Code Coverage Report
          path: target/site/jacoco

  DAST-Security-Scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
    needs: Test-and-Build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    steps:
      - name: Setting Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25
          
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: App
          path: .
    
      - name: Start Application for DAST
        run: |
          java -jar app.jar &
          sleep 30
        working-directory: .
      
      - name: OWASP ZAP Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        with:
          name: dast-reports
          path: /home/runner/work/_actions/zaproxy/action-full-scan/*/report_*.html
          retention-days: 7
        if: always()


  Deploy:
    runs-on: ubuntu-latest
    needs: Test-and-Build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      url: ${{ steps.deploy.outputs.app-url }}
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: App
          path: .
    
      - name: Configure Deploy Platform
        run: | 
          echo "::warning::Configure uma plataforma válida, do marketplace, para Deploy."
          exit 1

      - name: Deploy to Environment
        id: deploy
        run: |
          echo "Deploying to ${{ github.event.inputs.environment || 'dev' }} environment"
          echo "app-url=https://app-${{ github.event.inputs.environment || 'dev' }}.example.com" >> $GITHUB_OUTPUT

      - name: Post-Deploy Validation (Selenium)
        run: |
          echo "Executando testes de validação pós-deploy..."
          mvn test -Dtest=PostDeployTests -Dbase.url=${{ steps.deploy.outputs.app-url }}
        continue-on-error: false
      
      - name: Generate Deploy Summary
        run: |
          echo "## 🚀 Deploy Realizado" >> $GITHUB_STEP_SUMMARY
          echo "- **Ambiente**: ${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.deploy.outputs.app-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Sucesso" >> $GITHUB_STEP_SUMMARY
          echo "- **Validação Pós-Deploy**: Testes Selenium executados com sucesso" >> $GITHUB_STEP_SUMMARY

  Monitoring:
    runs-on: ubuntu-latest
    needs: [Test-and-Build, DAST-Security-Scan, Deploy]
    if: always()
    steps:
      - name: Generate Final Status Badge
        run: |
          echo "## 📈 Status Final do Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build and Test | ${{ needs.Test-and-Build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DAST Scan | ${{ needs.DAST-Security-Scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.Deploy.result }} |" >> $GITHUB_STEP_SUMMARY
